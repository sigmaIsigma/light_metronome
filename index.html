<!DOCTYPE html>
<html lang="ja">

    Font: Ubuntu Mono (Ubuntu Font License)
    
    A high-precision, low-resource metronome designed for performance and stability.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Light Metronome</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#000a28">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --split-pos: 60%; }
        body {
            background-color: rgb(0, 10, 40);
            color: white;
            margin: 0;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: row;
            font-family: 'Ubuntu Mono', monospace;
            font-weight: normal;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        @media (orientation: portrait) {
            body { flex-direction: column; --split-pos: 45%; }
        }

        #source-link {
            position: absolute; top: 20px; left: 20px;
            color: rgba(255, 255, 255, 0.4); text-decoration: none;
            font-size: 1rem; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 12px; z-index: 100;
            transition: all 0.2s;
        }
        #source-link:hover {
            color: white;
            border-color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        #display-pane {
            width: var(--split-pos);
            height: 100%;
            overflow-y: auto; overflow-x: hidden;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        @media (orientation: portrait) {
            #display-pane { width: 100%; height: var(--split-pos); }
        }

        #display-content {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100%;
            width: 100%;
            padding: 60px 20px 100px 20px;
            box-sizing: border-box;
        }

        #bpm-display { 
            font-size: 15vw; line-height: 1; margin-bottom: 50px; flex-shrink: 0;
            font-weight: bold;
        }
        @media (orientation: portrait) { #bpm-display { font-size: 25vw; } }

        #meter-container {
            display: flex; flex-wrap: wrap; gap: 8px;
            width: 100%; max-width: 1400px; justify-content: center;
            box-sizing: border-box;
        }
        .beat-box {
            min-width: 60px; height: 60px; padding: 0 8px;
            aspect-ratio: 1 / 1; display: flex;
            justify-content: center; align-items: center;
            border: 2px solid white; font-size: 1.8rem;
            color: white; box-sizing: border-box;
            transition: none;
            position: relative;
            font-weight: bold;
        }
        @media (max-width: 600px) {
            .beat-box { min-width: 50px; height: 50px; font-size: 1.4rem; border-width: 1.5px; }
        }
        .beat-box sub { font-size: 1rem; margin-left: 2px; vertical-align: sub; color: #00d2ff; font-weight: bold; }
        .beat-box.active { background: white; color: rgb(0, 10, 40); }
        .beat-box.active sub { color: rgb(0, 10, 40); }

        #divider { width: 8px; background: rgba(255, 255, 255, 0.2); cursor: col-resize; z-index: 10; }
        #divider:hover, #divider.dragging { background: white; }
        @media (orientation: portrait) { #divider { width: 100%; height: 8px; cursor: row-resize; } }

        #controls-pane {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.4); padding: 30px 20px;
            box-sizing: border-box; min-width: 320px; overflow-y: auto;
        }
        @media (orientation: portrait) { #controls-pane { width: 100%; height: auto; flex: none; flex-grow: 1; } }

        #settings-menu { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 550px; margin-bottom: 30px; }
        @media (orientation: portrait) {
            #settings-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; }
        }
        .setting-column { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .setting-item { display: flex; align-items: center; justify-content: space-between; font-size: 1.1rem; gap: 15px; cursor: pointer; }
        .setting-item input[type="number"] {
            background: rgba(255, 255, 255, 0.1); border: 1px solid white; color: white;
            padding: 6px; font-family: 'Ubuntu Mono', monospace; font-size: 1.1rem;
            width: 90px; text-align: center;
            font-weight: normal;
        }
        .setting-item input[type="checkbox"] { 
            width: 24px; height: 24px; cursor: pointer; 
            accent-color: #4daafc;
        }
        #check-unsafe { accent-color: #ff3b30; }

        .action-btn {
            font-size: 2rem; padding: 15px 0; width: 100%; max-width: 550px;
            border: 3px solid white; color: white; background: transparent;
            font-family: 'Ubuntu Mono', monospace; cursor: pointer; 
            font-weight: bold;
            flex-shrink: 0; transition: all 0.2s;
            margin-bottom: 10px;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .action-btn:active { transform: scale(0.98); opacity: 0.8; }
        
        #start-stop-btn.running { background: #ff3b30; border-color: #ff3b30; }
        #start-stop-btn.running:hover { background: #ff453a; border-color: #ff453a; }

        #tap-btn { font-size: 1.2rem; padding: 10px 0; border-width: 2px; }

        .footer { 
            margin-top: auto; color: rgba(255, 255, 255, 0.3); font-size: 1rem; width: 100%; 
            display: flex; justify-content: space-between; align-items: flex-end;
            padding-top: 25px; 
        }
        .footer a { color: rgba(255, 255, 255, 0.5); text-decoration: underline; transition: all 0.2s; }
        .footer a:hover { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }

        .setting-column + .setting-column { margin-top: 30px; }
        @media (orientation: portrait) { .setting-column + .setting-column { margin-top: 0; } }
    </style>
</head>
<body>

    <div id="display-pane">
        <a href="https://github.com/sigmaIsigma" id="source-link" target="_blank">SourceCode(GitHub)</a>
        <div id="display-content">
            <div id="bpm-display">120</div>
            <div id="meter-container"></div>
        </div>
    </div>

    <div id="divider"></div>

    <div id="controls-pane">
        <div id="settings-menu">
            <div class="setting-column">
                <label class="setting-item">Tempo (BPM) <input type="number" id="input-bpm" value="120" min="0" max="1000" step="1"></label>
                <label class="setting-item">Beats/Bar <input type="number" id="input-beats" value="4" min="0" max="64"></label>
                <label class="setting-item">Subdivision <input type="number" id="input-sub" value="1" min="1" max="16"></label>
                <label class="setting-item">Click Pitch (Hz) <input type="number" id="input-freq" value="880" min="20"></label>
                <label class="setting-item" style="color: #ff3b30;">Unsafe Mode <input type="checkbox" id="check-unsafe"></label>
            </div>
            <div class="setting-column">
                <label class="setting-item">Accent Vol % <input type="number" id="input-vol-acc" value="100" min="0" max="100"></label>
                <label class="setting-item">Beat Vol % <input type="number" id="input-vol-beat" value="80" min="0" max="100"></label>
                <label class="setting-item">Subdiv Vol % <input type="number" id="input-vol-sub" value="40" min="0" max="100"></label>
                <label class="setting-item">Mute <input type="checkbox" id="check-mute"></label>
                <label class="setting-item">Fullscreen <input type="checkbox" id="check-fullscreen"></label>
            </div>
        </div>
        <button id="start-stop-btn" class="action-btn">START (Space)</button>
        <button id="tap-btn" class="action-btn">TAP TEMPO (T)</button>
        <div class="footer">
            <div style="display:flex; flex-direction:column; gap:5px;">
                <a href="#" id="reset-settings" style="font-size:0.8rem; opacity:0.5; width: fit-content; text-decoration: none;">[Reset All Settings]</a>
                <span><b>Copyright:</b> (c) 2026 <a href="https://github.com/sigmaIsigma" target="_blank" style="color: inherit;">σiΣ</a> (<a href="LICENSE" style="color: inherit;">MIT License</a>)</span>
            </div>
            <span><b>Font:</b> <a href="https://fonts.google.com/specimen/Ubuntu+Mono" target="_blank" style="color: inherit;">Ubuntu Mono (UFL)</a></span>
        </div>
    </div>

    <script>
        /**
         * Light Metronome
         * (c) 2026 σiΣ (https://github.com/sigmaIsigma)
         * Licensed under MIT License
         */
        
        // --- Core State ---
        let bpm = 120, beatsPerMeasure = 4, subdivisions = 1, frequency = 880;
        let volAcc = 1.0, volBeat = 0.8, volSub = 0.4, isMuted = false, isRunning = false;
        let audioCtx = null, wakeLock = null, silentLoop = null;

        // --- Timing & Synchronization ---
        let currentTick = 0, nextTickTime = 0;
        const LOOKAHEAD_MS = 25.0, SCHEDULE_AHEAD_SEC = 0.1;
        let timerID = null;

        // --- UI & Interaction Cache ---
        let beatBoxElements = [];
        let visualQueue = [];
        let tapTimes = [];

        const dom = {
            pane: document.getElementById('display-pane'),
            bpm: document.getElementById('bpm-display'),
            meter: document.getElementById('meter-container'),
            start: document.getElementById('start-stop-btn'),
            tap: document.getElementById('tap-btn'),
            reset: document.getElementById('reset-settings'),
            inputs: {
                bpm: document.getElementById('input-bpm'),
                beats: document.getElementById('input-beats'),
                sub: document.getElementById('input-sub'),
                volAcc: document.getElementById('input-vol-acc'),
                volBeat: document.getElementById('input-vol-beat'),
                volSub: document.getElementById('input-vol-sub'),
                freq: document.getElementById('input-freq'),
                mute: document.getElementById('check-mute'),
                full: document.getElementById('check-fullscreen'),
                unsafe: document.getElementById('check-unsafe')
            }
        };

        const STORAGE_KEY = 'light_metronome_v1';

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                    latencyHint: 'interactive' // Lowest possible latency
                });
            }
        }

        /**
         * Silent Loop: Keeps the AudioContext hardware alive on mobile/low-spec devices.
         * Prevents the OS from putting the audio thread to sleep when muted or between clicks.
         */
        function startSilentLoop() {
            if (!audioCtx || silentLoop) return;
            const buffer = audioCtx.createBuffer(1, 1, 44100);
            silentLoop = audioCtx.createBufferSource();
            silentLoop.buffer = buffer;
            silentLoop.loop = true;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.00001; // Effectively silent but active
            silentLoop.connect(gain);
            gain.connect(audioCtx.destination);
            silentLoop.start();
        }

        function stopSilentLoop() {
            if (silentLoop) {
                try { silentLoop.stop(); } catch(e) {}
                silentLoop = null;
            }
        }

        // --- Persistence ---
        function saveSettings() {
            const settings = {
                bpm: dom.inputs.bpm.value,
                beats: dom.inputs.beats.value,
                sub: dom.inputs.sub.value,
                volAcc: dom.inputs.volAcc.value,
                volBeat: dom.inputs.volBeat.value,
                volSub: dom.inputs.volSub.value,
                freq: dom.inputs.freq.value,
                mute: dom.inputs.mute.checked,
                unsafe: dom.inputs.unsafe.checked,
                splitPos: getComputedStyle(document.documentElement).getPropertyValue('--split-pos')
            };
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(settings)); } catch(e) {}
        }

        function loadSettings() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return;
                const s = JSON.parse(saved);
                if (s.bpm !== undefined) dom.inputs.bpm.value = s.bpm;
                if (s.beats !== undefined) dom.inputs.beats.value = s.beats;
                if (s.sub !== undefined) dom.inputs.sub.value = s.sub;
                if (s.volAcc !== undefined) dom.inputs.volAcc.value = s.volAcc;
                if (s.volBeat !== undefined) dom.inputs.volBeat.value = s.volBeat;
                if (s.volSub !== undefined) dom.inputs.volSub.value = s.volSub;
                if (s.freq !== undefined) dom.inputs.freq.value = s.freq;
                if (s.mute !== undefined) dom.inputs.mute.checked = s.mute;
                if (s.unsafe !== undefined) dom.inputs.unsafe.checked = s.unsafe;
                if (s.splitPos !== undefined) document.documentElement.style.setProperty('--split-pos', s.splitPos);
            } catch(e) {}
        }

        // --- UI Rendering ---
        function updateMeterUI() {
            const fragment = document.createDocumentFragment();
            const displayBeats = beatsPerMeasure === 0 ? 1 : beatsPerMeasure;
            beatBoxElements = [];
            for (let b = 0; b < displayBeats; b++) {
                for (let s = 0; s < subdivisions; s++) {
                    const box = document.createElement('div');
                    box.className = 'beat-box';
                    if (beatsPerMeasure > 0) {
                        box.textContent = b + 1;
                        if (subdivisions > 1) {
                            const sub = document.createElement('sub');
                            sub.textContent = s + 1;
                            box.appendChild(sub);
                        }
                    } else { box.innerHTML = '&nbsp;'; }
                    fragment.appendChild(box);
                    beatBoxElements.push(box);
                }
            }
            dom.meter.innerHTML = '';
            dom.meter.appendChild(fragment);
        }

        /**
         * Core Scheduler: Uses high-precision AudioContext timer.
         */
        function scheduleTick(tickIndex, time) {
            if (!isMuted) {
                const osc = audioCtx.createOscillator();
                const envelope = audioCtx.createGain();
                const isHeadOfBeat = (tickIndex % subdivisions === 0);
                const isFirstBeat = (tickIndex === 0);

                let currentVol = 0;
                if (beatsPerMeasure === 0) {
                    osc.frequency.value = frequency * 0.5;
                    currentVol = volBeat;
                } else if (isFirstBeat) {
                    osc.frequency.value = frequency * 1.5;
                    currentVol = volAcc;
                } else if (isHeadOfBeat) {
                    osc.frequency.value = frequency;
                    currentVol = volBeat;
                } else {
                    osc.frequency.value = frequency * 0.5;
                    currentVol = volSub;
                }

                envelope.gain.value = currentVol;
                envelope.gain.exponentialRampToValueAtTime(currentVol || 0.001, time + 0.001);
                envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                osc.connect(envelope);
                envelope.connect(audioCtx.destination);
                osc.start(time);
                osc.stop(time + 0.1);
            }
            visualQueue.push({ time, tickIndex });
            if (visualQueue.length > 100) visualQueue.shift();
        }

        function scheduler() {
            while (nextTickTime < audioCtx.currentTime + SCHEDULE_AHEAD_SEC) {
                if (bpm > 0) {
                    scheduleTick(currentTick, nextTickTime);
                    const secondsPerTick = (60.0 / bpm) / subdivisions;
                    nextTickTime += secondsPerTick;
                    const totalTicks = (beatsPerMeasure === 0 ? 1 : beatsPerMeasure) * subdivisions;
                    currentTick = (currentTick + 1) % totalTicks;
                } else {
                    nextTickTime = audioCtx.currentTime + SCHEDULE_AHEAD_SEC;
                    break;
                }
            }
            timerID = setTimeout(scheduler, LOOKAHEAD_MS);
        }

        /**
         * Visual Loop: Decoupled from Audio Scheduler for performance.
         */
        function drawLoop() {
            if (!isRunning) return;
            if (bpm > 0) {
                while (visualQueue.length > 0 && visualQueue[0].time <= audioCtx.currentTime) {
                    const { tickIndex } = visualQueue.shift();
                    for (let i = 0; i < beatBoxElements.length; i++) {
                        if (i === tickIndex) {
                            if (!beatBoxElements[i].classList.contains('active')) {
                                beatBoxElements[i].classList.add('active');
                                handleAutoScroll(beatBoxElements[i]);
                            }
                        } else { beatBoxElements[i].classList.remove('active'); }
                    }
                }
            }
            requestAnimationFrame(drawLoop);
        }

        function handleAutoScroll(element) {
            const rect = element.getBoundingClientRect();
            const paneRect = dom.pane.getBoundingClientRect();
            if (rect.bottom > paneRect.bottom - 40 || rect.top < paneRect.top + 40) {
                const targetScroll = (dom.pane.scrollTop + (rect.top - paneRect.top)) - (paneRect.height / 2) + (rect.height / 2);
                dom.pane.scrollTo({ top: targetScroll, behavior: 'smooth' });
            }
        }

        function applySettings(manualBpm = null) {
            const isUnsafe = dom.inputs.unsafe.checked;
            
            // Limit management
            if (!isUnsafe) {
                dom.inputs.bpm.max = 1000; dom.inputs.beats.max = 64; dom.inputs.sub.max = 16;
                if (parseFloat(dom.inputs.bpm.value) > 1000) dom.inputs.bpm.value = 1000;
                if (parseInt(dom.inputs.beats.value) > 64) dom.inputs.beats.value = 64;
                if (parseInt(dom.inputs.sub.value) > 16) dom.inputs.sub.value = 16;
            } else {
                dom.inputs.bpm.removeAttribute('max'); dom.inputs.beats.removeAttribute('max'); dom.inputs.sub.removeAttribute('max');
            }

            let newBpm = manualBpm !== null ? manualBpm : parseFloat(dom.inputs.bpm.value);
            if (isNaN(newBpm)) newBpm = 0;
            newBpm = Math.floor(newBpm * 10) / 10; // Truncate at 0.01 units
            if (manualBpm !== null) dom.inputs.bpm.value = newBpm.toFixed(1);
            
            let newBeats = parseInt(dom.inputs.beats.value);
            if (isNaN(newBeats)) newBeats = 0;
            let newSub = parseInt(dom.inputs.sub.value);
            if (isNaN(newSub)) newSub = 1;

            if (!isUnsafe) {
                newBpm = Math.min(Math.max(0, newBpm), 1000);
                newBeats = Math.min(Math.max(0, newBeats), 64);
                newSub = Math.min(Math.max(1, newSub), 16);
            } else { newSub = Math.max(1, newSub); }

            // Immediate reset logic for all tempo/rhythm changes
            if (newBpm !== bpm || newBeats !== beatsPerMeasure || newSub !== subdivisions) {
                const oldBpm = bpm;
                bpm = newBpm; beatsPerMeasure = newBeats; subdivisions = newSub;
                updateMeterUI();
                if (isRunning) {
                    currentTick = 0; 
                    nextTickTime = audioCtx.currentTime; 
                    visualQueue = []; 
                }
            }
            
            volAcc = (parseInt(dom.inputs.volAcc.value) || 0) / 100.0;
            volBeat = (parseInt(dom.inputs.volBeat.value) || 0) / 100.0;
            volSub = (parseInt(dom.inputs.volSub.value) || 0) / 100.0;
            frequency = Math.max(20, parseInt(dom.inputs.freq.value) || 880);
            isMuted = dom.inputs.mute.checked;
            dom.bpm.textContent = bpm % 1 === 0 ? bpm : bpm.toFixed(1);
            
            // Audio persistence optimization
            if (isRunning && !isMuted) startSilentLoop();
            else stopSilentLoop();
            
            saveSettings();
        }

        function tapTempo() {
            const now = performance.now();
            tapTimes.push(now);
            if (tapTimes.length > 4) tapTimes.shift();
            if (tapTimes.length >= 2) {
                const intervals = [];
                for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
                const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
                let tappedBpm = 60000 / avgInterval;
                tappedBpm = Math.floor(tappedBpm * 10) / 10;
                if (!dom.inputs.unsafe.checked) tappedBpm = Math.min(tappedBpm, 1000);
                applySettings(tappedBpm);
            }
        }

        function toggleApp() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (!isRunning) {
                applySettings();
                isRunning = true;
                currentTick = 0; visualQueue = [];
                dom.start.textContent = 'STOP (Space)';
                dom.start.classList.add('running');
                nextTickTime = audioCtx.currentTime + 0.05;
                scheduler();
                requestAnimationFrame(drawLoop);
                if (!isMuted) startSilentLoop();
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(l => wakeLock = l).catch(()=>{});
            } else {
                isRunning = false;
                clearTimeout(timerID);
                stopSilentLoop();
                dom.start.textContent = 'START (Space)';
                dom.start.classList.remove('running');
                if (wakeLock) { wakeLock.release(); wakeLock = null; }
                visualQueue = [];
                beatBoxElements.forEach(b => b.classList.remove('active'));
            }
        }

        // --- Event Listeners ---
        dom.start.addEventListener('click', toggleApp);
        dom.tap.addEventListener('click', (e) => { e.preventDefault(); tapTempo(); });
        
        dom.reset.addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Reset all settings to default?')) {
                localStorage.removeItem(STORAGE_KEY);
                // Hard reset values
                dom.inputs.bpm.value = 120;
                dom.inputs.beats.value = 4;
                dom.inputs.sub.value = 1;
                dom.inputs.freq.value = 880;
                dom.inputs.volAcc.value = 100;
                dom.inputs.volBeat.value = 80;
                dom.inputs.volSub.value = 40;
                dom.inputs.mute.checked = false;
                dom.inputs.unsafe.checked = false;
                document.documentElement.style.setProperty('--split-pos', '60%');
                window.location.reload();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); toggleApp(); }
            if (e.code === 'KeyT') { e.preventDefault(); tapTempo(); }
        });

        Object.values(dom.inputs).forEach(input => {
            input.addEventListener('input', () => applySettings());
            if (input.type === 'number') {
                input.addEventListener('blur', () => {
                    const isUnsafe = dom.inputs.unsafe.checked;
                    let val = parseFloat(input.value);
                    if (input.value === '' || isNaN(val)) {
                        if (input === dom.inputs.sub) input.value = 1;
                        else if (input === dom.inputs.bpm || input === dom.inputs.beats) input.value = 0;
                        else if (input === dom.inputs.freq) input.value = 880;
                        else input.value = 0;
                    } else if (!isUnsafe) {
                        if (input === dom.inputs.bpm) input.value = Math.min(Math.max(0, val), 1000);
                        else if (input === dom.inputs.beats) input.value = Math.min(Math.max(0, val), 64);
                        else if (input === dom.inputs.sub) input.value = Math.min(Math.max(1, val), 16);
                    } else if (input === dom.inputs.sub) { input.value = Math.max(1, val); }
                    applySettings();
                });
            }
        });

        const dividerEl = document.getElementById('divider');
        let isDragging = false;
        const onDrag = (e) => {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const p = (window.innerHeight > window.innerWidth) ? (clientY / window.innerHeight) : (clientX / window.innerWidth);
            document.documentElement.style.setProperty('--split-pos', `${Math.min(Math.max(p * 100, 20), 80)}%`);
            saveSettings();
        };
        dividerEl.addEventListener('mousedown', () => { isDragging = true; dividerEl.classList.add('dragging'); });
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', () => { isDragging = false; dividerEl.classList.remove('dragging'); });
        dividerEl.addEventListener('touchstart', () => { isDragging = true; });
        window.addEventListener('touchmove', onDrag);
        window.addEventListener('touchend', () => { isDragging = false; });

        dom.inputs.full.addEventListener('change', () => {
            if (dom.inputs.full.checked) document.documentElement.requestFullscreen?.();
            else document.exitFullscreen?.();
        });

        // --- Init ---
        loadSettings();
        updateMeterUI();
        applySettings();
    </script>
</body>
</html>
